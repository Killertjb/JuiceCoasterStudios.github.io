<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link rel="stylesheet" href="style.css">

<style>
/* Contact page specific styles */
.contact-section{
padding:80px 40px;
max-width:900px;
margin:auto;
text-align:center;
}

.contact-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.contact-card{
border:1px solid #eee;
padding:30px;
}

.contact-card a{
text-decoration:none;
color:black;
font-weight:bold;
}

.contact-form{
margin-top:60px;
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:12px;
border:1px solid #ddd;
width:100%;
}

.contact-form button{
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>
<!-- HEADER -->
<header class="header">
<div class="logo">Juice Coaster Studios</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="contacts.html">Contact</a>
</nav>
  
</header>

<!-- CONTACT SECTION -->
<section class="contact-section">

<h1>How To Reach Us</h1>
<p>Have a question? Reach out to us using any of the options below !</p>

<div class="contact-grid">

<div class="contact-card">
<h3>Email</h3>
<p>
<a href="mailto:your@email.com"> <!-- Please chage this line to reflect a working email -->
your@email.com 
</a>
</p>
</div>

<div class="contact-card">
<h3>WhatsApp</h3>
<p>
<a href="https://wa.me/27123456789"> <!-- Please chage this line to reflect a working Whatsapp Number -->
+27 12 345 6789
</a>
</p>
</div>

<div class="contact-card">
<h3>Social Media</h3>
<p>
<a href="#">Instagram</a><br> <!-- Please chage this line to reflect a working Instagram Account-->
<a href="#">Facebook</a><br> <!-- Please chage this line to reflect a working Facebook Account -->
<a href="#">TikTok</a> <!-- Please chage this line to reflect a working Tik-Tok Account -->
</p>
</div>

</div>

<!-- OPTIONAL CONTACT FORM -->
<form class="contact-form">
  
<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="5" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 Juice Coaster Studios</p>
</footer>

</body>
</html>
